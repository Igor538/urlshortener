<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Encurtador de Links</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card{
    background:#111827;
    padding:30px;
    border-radius:15px;
    width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    text-align:center;
}

h1{
    color:#38bdf8;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #334155;
    background:#1e293b;
    color:white;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    background:#38bdf8;
    color:#0f172a;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0ea5e9;
}

/* link simples centralizado */
.dashboard-link{
    display:block;
    margin-top:18px;
    text-align:center;
    color:#38bdf8;
    text-decoration:none;
    font-size:14px;
    cursor:pointer;
}

.dashboard-link:hover{
    opacity:0.8;
}
</style>

</head>

<body>

<div class="card">

<h1>🔗 Encurtador de Links</h1>

<form action="/shorten-ui" method="post">
    <input type="url" name="url" placeholder="Cole seu link aqui..." required>

    <button type="submit">
        Encurtar agora
    </button>
</form>

<a href="/dashboard" class="dashboard-link">
    Dashboard
</a>

</div>

</body>
</html>
