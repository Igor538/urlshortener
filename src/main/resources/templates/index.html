<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Encurtador de Links</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            background: #111827;
            padding: 30px;
            border-radius: 15px;
            width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b; 
            color: white;
            outline: none;
            margin-top: 10px;
            font-size: 14px;
            box-sizing: border-box; 
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0ea5e9;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🔗 Encurtador de Links</h1>

    <form action="/shorten-ui" method="post">
        <input type="url" name="url" placeholder="Cole seu link aqui..." required>
        <button type="submit">Encurtar agora</button>
    </form>

    <div class="footer">
        Sistema simples de links curtos
    </div>
</div>

</body>
</html>
