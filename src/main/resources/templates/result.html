<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Link criado</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card{
    background:#111827;
    padding:30px;
    border-radius:15px;
    width:420px;
    text-align:center;
}

h2{
    color:#22c55e;
}

a{
    display:block;
    margin-top:15px;
    padding:12px;
    background:#0f172a;
    border-radius:8px;
    color:#38bdf8;
    text-decoration:none;
    word-break:break-all;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.back{
    font-size:12px;
    opacity:.7;
}
</style>

</head>

<body>

<div class="card">

<h2>🎉 Link criado com sucesso!</h2>

<a id="shortLink"
   th:text="${shortUrl}"
   th:href="${shortUrl}"
   target="_blank">
</a>

<button onclick="copy()">
📋 Copiar link
</button>

<a class="back" href="/">
← Criar outro link
</a>

<a class="back" href="/dashboard">
📊 Dashboard
</a>

</div>

<script>
function copy(){
    const link =
    document.getElementById("shortLink").innerText;

    navigator.clipboard.writeText(link);

    alert("Link copiado!");
}
</script>

</body>
</html>
